<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="b2sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1060B0"/>
      <stop offset="55%" stop-color="#4A9DE0"/>
      <stop offset="100%" stop-color="#9DD4F5"/>
    </linearGradient>
    <linearGradient id="b2fairway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52C068"/>
      <stop offset="50%" stop-color="#3DA850"/>
      <stop offset="100%" stop-color="#28753A"/>
    </linearGradient>
    <linearGradient id="b2rough" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A7A38"/>
      <stop offset="100%" stop-color="#1A5228"/>
    </linearGradient>
    <linearGradient id="b2light" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#FFE080" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#FFE080" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFE080" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="b2vanish" cx="50%" cy="42%" r="15%">
      <stop offset="0%" stop-color="#C8F0C0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#52C068" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="800" fill="url(#b2sky)"/>

  <!-- Morning warm light from left -->
  <rect width="800" height="800" fill="url(#b2light)"/>

  <!-- Clouds -->
  <g fill="white">
    <ellipse cx="200" cy="130" rx="80" ry="28" opacity="0.88"/>
    <ellipse cx="150" cy="141" rx="52" ry="22" opacity="0.82"/>
    <ellipse cx="252" cy="139" rx="58" ry="23" opacity="0.82"/>
    <ellipse cx="200" cy="150" rx="84" ry="18" opacity="0.80"/>
    <ellipse cx="580" cy="95" rx="65" ry="22" opacity="0.85"/>
    <ellipse cx="537" cy="104" rx="42" ry="18" opacity="0.80"/>
    <ellipse cx="624" cy="103" rx="46" ry="19" opacity="0.80"/>
    <ellipse cx="370" cy="180" rx="45" ry="15" opacity="0.72"/>
    <ellipse cx="342" cy="187" rx="30" ry="13" opacity="0.68"/>
  </g>

  <!-- Horizon glow -->
  <ellipse cx="400" cy="430" rx="250" ry="60" fill="#D0EFD0" opacity="0.25"/>

  <!-- Far rough / tree line horizon -->
  <path d="M0,395 Q60,378 120,385 Q180,370 230,382 Q280,368 330,378 Q370,365 400,373 Q430,365 470,374 Q510,362 570,376 Q620,365 680,374 Q730,366 800,372 L800,410 L0,410Z" fill="#2A6E35" opacity="0.6"/>

  <!-- Tree line left -->
  <g fill="#1C5826">
    <ellipse cx="25" cy="440" rx="30" ry="120" fill="#1A5224"/>
    <ellipse cx="55" cy="430" rx="28" ry="110" fill="#1E5E2C"/>
    <ellipse cx="82" cy="445" rx="26" ry="105" fill="#1A5224"/>
    <ellipse cx="108" cy="438" rx="24" ry="100" fill="#206230"/>
    <ellipse cx="132" cy="448" rx="22" ry="95" fill="#1A5224"/>
    <ellipse cx="155" cy="455" rx="20" ry="88" fill="#1E5E2C"/>
    <ellipse cx="176" cy="460" rx="18" ry="82" fill="#206230"/>
    <ellipse cx="196" cy="466" rx="16" ry="76" fill="#1A5224"/>
    <ellipse cx="214" cy="472" rx="14" ry="68" fill="#1E5E2C"/>
    <ellipse cx="230" cy="477" rx="13" ry="62" fill="#1A5224"/>
    <ellipse cx="245" cy="481" rx="12" ry="56" fill="#206230"/>
    <ellipse cx="258" cy="484" rx="11" ry="50" fill="#1A5224"/>
    <ellipse cx="270" cy="487" rx="10" ry="44" fill="#1E5E2C"/>
    <ellipse cx="280" cy="490" rx="9" ry="38" fill="#206230"/>
    <ellipse cx="289" cy="492" rx="8" ry="32" fill="#1A5224"/>
    <ellipse cx="298" cy="494" rx="7" ry="26" fill="#1E5E2C"/>
    <ellipse cx="306" cy="495" rx="6" ry="20" fill="#1A5224"/>
  </g>

  <!-- Tree line right -->
  <g fill="#1C5826">
    <ellipse cx="775" cy="440" rx="30" ry="120" fill="#1A5224"/>
    <ellipse cx="745" cy="430" rx="28" ry="110" fill="#1E5E2C"/>
    <ellipse cx="718" cy="445" rx="26" ry="105" fill="#1A5224"/>
    <ellipse cx="692" cy="438" rx="24" ry="100" fill="#206230"/>
    <ellipse cx="668" cy="448" rx="22" ry="95" fill="#1A5224"/>
    <ellipse cx="645" cy="455" rx="20" ry="88" fill="#1E5E2C"/>
    <ellipse cx="624" cy="460" rx="18" ry="82" fill="#206230"/>
    <ellipse cx="604" cy="466" rx="16" ry="76" fill="#1A5224"/>
    <ellipse cx="586" cy="472" rx="14" ry="68" fill="#1E5E2C"/>
    <ellipse cx="570" cy="477" rx="13" ry="62" fill="#1A5224"/>
    <ellipse cx="555" cy="481" rx="12" ry="56" fill="#206230"/>
    <ellipse cx="542" cy="484" rx="11" ry="50" fill="#1A5224"/>
    <ellipse cx="530" cy="487" rx="10" ry="44" fill="#1E5E2C"/>
    <ellipse cx="519" cy="490" rx="9" ry="38" fill="#206230"/>
    <ellipse cx="510" cy="492" rx="8" ry="32" fill="#1A5224"/>
    <ellipse cx="502" cy="494" rx="7" ry="26" fill="#1E5E2C"/>
    <ellipse cx="494" cy="495" rx="6" ry="20" fill="#1A5224"/>
  </g>

  <!-- Rough left -->
  <path d="M0,490 L310,490 Q360,510 320,600 Q290,680 270,800 L0,800Z" fill="url(#b2rough)"/>
  <!-- Rough right -->
  <path d="M800,490 L490,490 Q440,510 480,600 Q510,680 530,800 L800,800Z" fill="url(#b2rough)"/>

  <!-- Fairway (perspective trapezoid) -->
  <path d="M315,490 Q355,488 400,488 Q445,488 485,490 Q510,560 530,640 Q550,720 560,800 L240,800 Q250,720 270,640 Q290,560 315,490Z" fill="url(#b2fairway)"/>

  <!-- Fairway mowing stripes -->
  <g opacity="0.18" fill="#70D080">
    <path d="M320,510 L480,510 L474,540 L326,540Z"/>
    <path d="M328,550 L472,550 L466,580 L334,580Z"/>
    <path d="M336,590 L464,590 L458,620 L342,620Z"/>
    <path d="M344,630 L456,630 L450,660 L350,660Z"/>
    <path d="M352,670 L448,670 L444,700 L356,700Z"/>
    <path d="M360,710 L440,710 L437,740 L363,740Z"/>
    <path d="M368,750 L432,750 L430,780 L370,780Z"/>
  </g>

  <!-- Vanishing point glow -->
  <rect width="800" height="800" fill="url(#b2vanish)"/>

  <!-- Distant flag (vanishing point) -->
  <line x1="400" y1="440" x2="400" y2="418" stroke="#DDD" stroke-width="1.8"/>
  <path d="M400,418 L411,422 L400,426Z" fill="#E83040"/>

  <!-- Sand bunker hints -->
  <ellipse cx="255" cy="580" rx="32" ry="14" fill="#E8D580" opacity="0.7"/>
  <ellipse cx="545" cy="575" rx="28" ry="12" fill="#E8D580" opacity="0.7"/>

  <!-- Birds in sky -->
  <g stroke="#1060B0" stroke-width="1.8" fill="none" opacity="0.55">
    <path d="M130,200 Q135,195 140,200"/>
    <path d="M144,197 Q149,192 154,197"/>
    <path d="M220,170 Q225,165 230,170"/>
    <path d="M234,167 Q239,162 244,167"/>
    <path d="M620,155 Q625,150 630,155"/>
    <path d="M634,152 Q639,147 644,152"/>
  </g>
</svg>
