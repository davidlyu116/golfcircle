<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>GolfCircle Icon Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
  body { font-family: sans-serif; background: #f5f5f5; padding: 32px; }
  h2 { color: #1a7a3a; margin-bottom: 8px; }
  .section { background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px; display: inline-block; }
  canvas { display: block; border-radius: 22%; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  button { margin-top: 16px; background: #1a7a3a; color: white; border: none; border-radius: 10px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; display: block; }
  button:hover { background: #2d9e5f; }
  .row { display: flex; gap: 32px; flex-wrap: wrap; }
  p { color: #666; font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>
<h1 style="color:#1a7a3a;margin-bottom:24px">GolfCircle Icon Generator</h1>
<div class="row">

  <!-- 180x180 Apple Touch Icon -->
  <div class="section">
    <h2>iOS 主畫面 Icon</h2>
    <p>apple-touch-icon.png · 180×180px</p>
    <canvas id="c180" width="180" height="180"></canvas>
    <button onclick="dl('c180','apple-touch-icon.png')">⬇ 下載 apple-touch-icon.png</button>
  </div>

  <!-- 512x512 General Icon -->
  <div class="section">
    <h2>通用 Icon</h2>
    <p>icon-512.png · 512×512px</p>
    <canvas id="c512" width="512" height="512" style="width:180px;height:180px"></canvas>
    <button onclick="dl('c512','icon-512.png')">⬇ 下載 icon-512.png</button>
  </div>

  <!-- 1200x630 OG Cover -->
  <div class="section" style="display:block">
    <h2>LINE 分享圖</h2>
    <p>og-cover.png · 1200×630px</p>
    <canvas id="cog" width="1200" height="630" style="width:480px;height:252px"></canvas>
    <button onclick="dl('cog','og-cover.png')">⬇ 下載 og-cover.png</button>
  </div>

</div>

<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const cx = W / 2, cy = W / 2, r = W / 2;

    // Background gradient circle
    const grad = ctx.createLinearGradient(0, 0, W, W);
    grad.addColorStop(0, '#2d9e5f');
    grad.addColorStop(1, '#1a7a3a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // GC text
    const fontSize = Math.round(W * 0.44);
    ctx.fillStyle = 'white';
    ctx.font = `800 ${fontSize}px 'Nunito', 'Arial Rounded MT Bold', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('GC', cx, cy * 1.04);

    // Hole shadow ellipse
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(cx, W * 0.82, W * 0.07, W * 0.022, 0, 0, Math.PI * 2);
    ctx.fill();

    // Flag pole
    ctx.strokeStyle = 'white';
    ctx.lineWidth = W * 0.025;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, W * 0.81);
    ctx.lineTo(cx, W * 0.64);
    ctx.stroke();

    // Flag triangle
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(cx, W * 0.64);
    ctx.lineTo(cx + W * 0.14, W * 0.685);
    ctx.lineTo(cx, W * 0.73);
    ctx.closePath();
    ctx.fill();
}

function drawOG(canvas) {
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 630;

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#2d9e5f');
    grad.addColorStop(1, '#0d4a22');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Subtle circle pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 2;
    [120, 220, 320].forEach(r => {
        ctx.beginPath();
        ctx.arc(240, H / 2, r, 0, Math.PI * 2);
        ctx.stroke();
    });

    // Draw GC icon circle (left side)
    const iconSize = 300;
    const iconX = 90, iconY = H / 2 - iconSize / 2;
    const offscreen = document.createElement('canvas');
    offscreen.width = offscreen.height = iconSize;
    drawIcon(offscreen);
    ctx.save();
    ctx.beginPath();
    ctx.arc(iconX + iconSize / 2, iconY + iconSize / 2, iconSize / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(offscreen, iconX, iconY, iconSize, iconSize);
    ctx.restore();

    // Right side text
    const tx = 460;

    // "Golf" in white
    ctx.fillStyle = 'white';
    ctx.font = "800 130px 'Nunito', 'Arial Rounded MT Bold', sans-serif";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('Golf', tx, H / 2 - 10);

    // "Circle" in light green
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillText('Circle', tx, H / 2 + 120);

    // Tagline
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = "400 36px 'Nunito', Arial, sans-serif";
    ctx.fillText('記錄每一場球，看見最好的自己', tx, H / 2 + 180);
}

function dl(canvasId, filename) {
    const link = document.createElement('a');
    link.download = filename;
    link.href = document.getElementById(canvasId).toDataURL('image/png');
    link.click();
}

// Wait for Nunito font to load before drawing
document.fonts.ready.then(() => {
    drawIcon(document.getElementById('c180'));
    drawIcon(document.getElementById('c512'));
    drawOG(document.getElementById('cog'));
});
</script>
</body>
</html>
